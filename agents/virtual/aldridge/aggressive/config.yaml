name: Aldridge Aggressive
base_trader: aldridge
variant_type: aggressive
description: Wider moat tolerance, bigger positions, longer holds for value

model:
  primary: openrouter/deepseek/deepseek-v4-flash

risk:
  max_position_pct: 0.10
  max_exposure_pct: 0.60
  stop_loss_pct: 0.06
  max_daily_loss: 400
  cash_reserve: 2000
  min_shares_per_position: 1
  max_positions: 4

signals:
  momentum_weight: 0.15
  sentiment_weight: 0.35
  regime_weight: 0.50
  minimum_confidence: 0.30
  confirmations_required: 2

value_filters:
  max_pe: 25
  min_market_cap: 1000000000
  min_revenue_growth_pct: 5.0

fundamental:
  earnings_trend_min: positive
  price_to_book_max: 3.5
  div_yield_min: 0.0

exit_rules:
  profit_target_pct: 0.20
  max_hold_days: 14
  stale_days: 7

evaluation:
  eval_window_days: 5
  objective_metric: calmar_ratio