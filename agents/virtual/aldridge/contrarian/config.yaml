name: Aldridge Contrarian
base_trader: aldridge
variant_type: contrarian
description: GARP — growth at reasonable price, contrarian sentiment plays

model:
  primary: openrouter/deepseek/deepseek-v4-flash

risk:
  max_position_pct: 0.08
  max_exposure_pct: 0.40
  stop_loss_pct: 0.05
  max_daily_loss: 300
  cash_reserve: 2500
  min_shares_per_position: 1
  max_positions: 3

signals:
  momentum_weight: 0.25
  sentiment_weight: 0.40
  regime_weight: 0.35
  minimum_confidence: 0.40
  confirmations_required: 2

value_filters:
  max_pe: 30
  min_market_cap: 2000000000
  min_revenue_growth_pct: 15.0

fundamental:
  peg_ratio_max: 1.0
  earnings_trend_min: accelerating
  price_to_book_max: 5.0

exit_rules:
  profit_target_pct: 0.15
  max_hold_days: 10
  stale_days: 5

evaluation:
  eval_window_days: 5
  objective_metric: total_return