name: Aldridge Conservative
base_trader: aldridge
variant_type: conservative
description: Strict value — high conviction, small positions, maximum quality

model:
  primary: openrouter/deepseek/deepseek-v4-flash

risk:
  max_position_pct: 0.05
  max_exposure_pct: 0.20
  stop_loss_pct: 0.05
  max_daily_loss: 200
  cash_reserve: 3000
  min_shares_per_position: 1
  max_positions: 2

signals:
  momentum_weight: 0.10
  sentiment_weight: 0.30
  regime_weight: 0.60
  minimum_confidence: 0.70
  confirmations_required: 3

value_filters:
  max_pe: 15
  min_market_cap: 5000000000
  min_revenue_growth_pct: 8.0

fundamental:
  earnings_trend_min: stable
  price_to_book_max: 2.0
  div_yield_min: 0.5

exit_rules:
  profit_target_pct: 0.15
  max_hold_days: 20
  stale_days: 10

evaluation:
  eval_window_days: 10
  objective_metric: sharpe_ratio